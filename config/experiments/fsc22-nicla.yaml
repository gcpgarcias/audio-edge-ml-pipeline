    features_dir:  data/processed/fsc22_classical_nicla_train
    features_test: data/processed/fsc22_classical_nicla_val
    params:
      hidden_units: [128, 64]
      dropout:      0.2
      epochs:       100
      batch_size:   16
      learning_rate: 0.001

