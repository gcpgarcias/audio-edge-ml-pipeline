# ── Deep models on mel spectrogram features ───────────────────────────────
  # Un-comment and point features_dir at a deep FeatureSet, e.g.
  #   data/processed/fsc22_melspec_train  (shape: N × H × W)
  # or
  #   data/processed/fsc22_mfcc_seq_train  (shape: N × T × D)

  - model: mlp
    name:  fsc22_6_classes_lean_mlp_train
    features_dir: data/processed/fsc22_classical_lean_train
    features_test: data/processed/fsc22_classical_lean_val
    params:
      hidden_units: [256, 128]
      dropout:      0.1
      epochs:       100
      batch_size:   16
      learning_rate: 0.003

