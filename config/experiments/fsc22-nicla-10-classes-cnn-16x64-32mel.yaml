  # ── Knowledge distillation pipeline ────────────────────────────────────────
  # Step 1: fine-tune EfficientNet-B0 as teacher (~29 MB, best accuracy)
  # Step 2: train tiny CNN student with soft labels from the teacher (<200 KB)
  #
  # Run Step 1 first, then uncomment Step 2 pointing at the saved teacher.

  # Step 1 — EfficientNet-B0 teacher (already trained, commented out)
  # - model: efficientnet_teacher
  #   name:  fsc22_nicla_10_classes_efficientnet_teacher
  #   features_dir:  data/processed/fsc22_melspec_augmented_train_2
  #   features_test: data/processed/fsc22_melspec_val_2
  #   params:
  #     warmup_epochs:       10
  #     unfreeze_layers:     20
  #     fine_tune_lr_factor: 0.1
  #     target_h:            224
  #     target_w:            224
  #     dropout:             0.3
  #     epochs:              100
  #     batch_size:          16
  #     learning_rate:       0.001

  # [16,64,64] on 32-mel features — top 8 bins dropped to match Nicla PDM mic
  - model: cnn
    name:  fsc22_nicla_10_classes_cnn_16x64_32mel
    features_dir:  data/processed/fsc22_melspec_augmented_train_32mel
    features_test: data/processed/fsc22_melspec_val_32mel
    params:
      filters:       [16, 64, 64]
      first_stride:  4
      second_stride: 2
      dropout:       0.25
      epochs:        100
      batch_size:         16
      learning_rate:      0.001