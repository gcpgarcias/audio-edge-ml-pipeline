  #   features_dir: data/processed/fsc22_classical_train
  #   grid:
  #     C:      [0.1, 1.0, 10.0, 100.0]
  #     kernel: [rbf, linear]

  - model:          decision_tree
    name:           fsc22_6_classes_lean_decision_tree_sweep
    features_dir:   data/processed/fsc22_classical_lean_train
    features_test:  data/processed/fsc22_classical_lean_val
    grid:
      max_depth:        [5, 10, 20, null]
      min_samples_leaf: [1, 2, 5]
      criterion:        [gini, entropy]

