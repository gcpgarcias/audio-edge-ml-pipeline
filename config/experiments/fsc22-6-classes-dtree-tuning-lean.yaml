# Stage 6a — Unified hyperparameter search
#
# Usage:
#   python -m src.training.tune --config config/tuning.yaml
#
# The dispatcher reads model_type from the trainer registry:
#   Classical (sklearn) → grid: key → GridSearchCV
#   Deep (Keras)        → search_space: key → random search
#
# Required keys: output_dir, runs

# ── Shared defaults ──────────────────────────────────────────────────────────

output_dir:  data/models/tuned
experiment:  fsc22-6-classes-dtree-tuning-lean
mlflow_uri:  mlruns/
class_filter:
  - Fire
  - Thunderstorm
  - WaterDrops
  - Silence
  - Helicopter
  - Gunshot


val_split:   0.2

# Classical-specific defaults
cv:      5
scoring: f1_macro

# Deep-specific defaults (Optuna TPE search)
n_trials:     100    # Optuna trials per deep run
sweep_epochs: 100    # max epochs per trial
seed:         42
pruner:       hyperband   # median | hyperband | none

# Optional: restrict classical runs to shortlisted models only.
# (Does not affect deep runs — remove or comment out to tune everything.)
# shortlist: data/models/shortlist_birdeep-classification.json

# ── Runs ────────────────────────────────────────────────────────────────────
#
# Each run must specify:
#   model:        registered trainer name
#   features_dir: FeatureSet directory
#   grid:         (classical only) hyperparameter grid for GridSearchCV
#   search_space: (deep only)      Optuna distributions per param:
#                   plain list → categorical  (backward-compatible)
#                   {type: categorical, choices: [...]}
#                   {type: float,       low: X, high: Y}          (uniform)
#                   {type: loguniform,  low: X, high: Y}          (log-uniform)
#                   {type: int,         low: X, high: Y}
#
# For pca_svm, friendly keys (n_components, C, kernel, gamma) are automatically
# remapped to sklearn Pipeline notation (pca__n_components, svm__C, …).

runs:

