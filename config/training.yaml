# Training pipeline — multi-model config
#
# Usage:
#   python -m src.training.train --config config/training.yaml
#
# Top-level fields are inherited by every run as defaults.
# Any run can override them by setting the same key locally.
#
# Required top-level keys: features_dir, output_dir

# ── Defaults ────────────────────────────────────────────────────────────────

features_dir:      data/processed/birdeep_classical_train
output_dir:        data/models
experiment:        birdeep-classification

# mlflow_uri: null    # null → env MLFLOW_TRACKING_URI or local "mlflow/"
#                     # Docker stack: export MLFLOW_TRACKING_URI=http://localhost:5000

val_split:         0.2

# Optional held-out test FeatureSet (same feature type as features_dir)
# features_test_dir: data/processed/birdeep_classical_test

# ── Runs ────────────────────────────────────────────────────────────────────

runs:

  # ── Classical models (flat audio_classical features) ──────────────────────

  - model: svm
    name:  birdeep_svm
    params:
      C:      1.0
      kernel: rbf
      gamma:  scale

  - model: svm
    name:  birdeep_svm_c10
    params:
      C:      10.0
      kernel: rbf

  - model: lda
    name:  birdeep_lda

  - model: decision_tree
    name:  birdeep_dtree
    params:
      max_depth:        10
      min_samples_leaf: 2

  - model: random_forest
    name:  birdeep_rf
    params:
      n_estimators: 200
      max_depth:    20

  - model: knn
    name:  birdeep_knn
    params:
      n_neighbors: 7
      metric:      minkowski

  - model: kmeans
    name:  birdeep_kmeans
    # n_clusters defaults to number of classes in the FeatureSet

  - model: pca_svm
    name:  birdeep_pca_svm
    params:
      n_components: 50
      C:            1.0
      kernel:       rbf

# ── Deep models on mel spectrogram features ───────────────────────────────
